<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="0; url=https://kraker.codeberg.page/rhcsa-field-manual/">
    <title>The RHCSA Field Manual moved to Codeberg</title>
    <script>
      const targetOrigin = "https://kraker.codeberg.page";
      const legacyPrefix = "/rhcsa-field-manual";
      let path = window.location.pathname;

      if (path === legacyPrefix) {
        path = `${legacyPrefix}/`;
      } else if (!path.startsWith(`${legacyPrefix}/`)) {
        path = `${legacyPrefix}${path}`;
      }

      window.location.replace(`${targetOrigin}${path}${window.location.search}${window.location.hash}`);
    </script>
  </head>
  <body>
    <p>
      The RHCSA Field Manual has moved to
      <a href="https://kraker.codeberg.page/rhcsa-field-manual/">https://kraker.codeberg.page/rhcsa-field-manual/</a>.
    </p>
  </body>
</html>
