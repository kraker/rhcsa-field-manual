project:
  type: book

book:
  # Working title
  title: "The RHCSA Field Manual"
  subtitle: "A hands-on guide to Red Hat Enterprise Linux 10 and the EX200 exam"
  author: "Alex Kraker"
  date: "5/12/2026"
  repo-url: https://github.com/kraker/rhcsa-field-manual
  repo-branch: main
  repo-subdir: book
  repo-actions: [issue, source]
  chapters:
    - index.qmd
    - part: "Front Matter"
      chapters:
        - 00-preface.qmd
        - 01-acknowledge.qmd
    - part: "Prerequisites"
      chapters:
        - prereqs/00-linux-cli.qmd
        - prereqs/01-redhat-account.qmd
        - prereqs/02-rhcsa-exam.qmd
        - prereqs/03-linux-workstation.qmd
        - prereqs/04-vagrant-lab.qmd

