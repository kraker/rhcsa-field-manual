  appendices:
    - appendices/00-windows-workstation.qmd
    - appendices/01-command-reference.qmd
    - appendices/02-glossary.qmd

bibliography: references.bib

format:
  html:
    toc: true
    toc-expand: true
    theme:
      dark: cyborg
      light: yeti
  # pdf:
  #   documentclass: scrreprt

execute:
  # re-execute a document only when its source file changes.
  freeze: auto

knitr:
  opts_knit:
    # Default to $HOME for executable {bash} code-blocks
    root.dir: "~"
